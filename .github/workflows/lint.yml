name: Lint

on:
  push:
    branches: [front]
  pull_request:
    branches: [front]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm install

      - name: Run ESLint
        run: npm run lint 2>&1 | tee eslint-report.txt; exit ${PIPESTATUS[0]}

      - name: Upload ESLint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eslint-report
          path: eslint-report.txt
