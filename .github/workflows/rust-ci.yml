name: Rust CI

on:
  push:
    branches: [back]
  pull_request:
    branches: [back]

jobs:
  quality:
    name: Format + Clippy + Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy (warnings = erreurs)
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Audit dependencies (vulnérabilités)
        # RUSTSEC-2023-0071: rsa Marvin Attack - dep transitive de sqlx/jsonwebtoken,
        # aucun fix disponible upstream. À re-vérifier lors des mises à jour de sqlx/jsonwebtoken.
        run: cargo audit --ignore RUSTSEC-2023-0071

  test:
    name: Tests unitaires
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            target/
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}
      - run: cargo test --all-features
